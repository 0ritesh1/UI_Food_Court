<!doctype html>
<html lang="en">
    <head>
    <title>Food Court | Register</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
        min-height: 100vh;
        background: linear-gradient(
            120deg,
            rgb(228, 171, 171),
            rgb(217, 150, 161),
            rgb(236, 119, 236),
            rgb(109, 218, 225),
            rgb(255, 52, 255)
        );
        background-size: 400% 400%;
        animation: gd 10s ease infinite;
        }

        @keyframes gd {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
        }
    </style>
    </head>

    <body class="d-flex flex-column">

        <header>
            <!-- Navbar -->
            <nav class="navbar navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="home.html">
                <img src="https://www.shutterstock.com/image-vector/festivasl-food-court-hall-logo-260nw-2233823755.jpg"
                    class="rounded-circle me-2" width="60" height="60">
                Food Court
                </a>
                <a href="login.html" class="btn btn-outline-light">Login</a>
            </div>
            </nav>
        </header>

        <!-- Main -->
        <main class="flex-grow-1 d-flex align-items-center justify-content-center py-4">
            <div class="container">
                <div class="row justify-content-center">

                    <div class="col-md-6 col-lg-5 g-0">
                        <div class="card shadow-lg rounded-4 overflow-hidden h-100">
                        <img
                            src="https://images.unsplash.com/photo-1625764559539-dbd7bf2e7779?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8Zm9vZCUyMGNvdXJ0fGVufDB8fDB8fHww"
                            class="img-fluid h-100 object-fit-cover"
                            alt="Food Court"
                        >
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-5 g-0">
                        <div class="card shadow-lg rounded-4 p-4 h-100">
                        <h3 class="text-center text-primary mb-4">Registration</h3>

                        <form action="login.html">
                            <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                            </div>

                            <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" required>
                            </div>

                            <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control">
                            </div>

                            <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" required>
                            </div>

                            <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" required>
                            </div>

                            <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" required>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="" />
                                <label class="form-check-label" for="">I agree to the <a href="#">Terms of Services.</a></label>
                            </div>
                            
                            <div class="d-grid gap-3 mt-3">
                            <button type="submit" class="btn btn-primary">Register</button>
                            <button type="reset" class="btn btn-outline-secondary">Reset</button>
                            </div>

                            <p class="text-center mt-3">
                            Already have an account? <a href="login.html">Login</a>
                            </p>
                        </form>

                        </div>
                    </div>


                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-primary text-light text-center py-2">
        <small>&copy; Food Court. All Rights Reserved | Ritesh Chaubey</small>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
