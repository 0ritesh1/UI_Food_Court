<!doctype html>
<html lang="en">
<head>
  <title>Food Court | Login</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(
        120deg,
        rgb(228, 171, 171),
        rgb(217, 150, 161),
        rgb(236, 119, 236),
        rgb(109, 218, 225),
        rgb(255, 52, 255)
      );
      background-size: 400% 400%;
      animation: gd 10s ease infinite;
    }

    @keyframes gd {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .login-bg {
      background-image: url('https://images.unsplash.com/photo-1553321846-ad6616f5d1db?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8Zm9vZCUyMGNvdXJ0fGVufDB8fDB8fHww');
      background-size: cover;
      background-position: center;
      min-height: 420px;
    }

    .bg-overlay {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 1rem;
    }

  </style>
</head>

<body class="d-flex flex-column">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="home.html">
      <img src="https://www.shutterstock.com/image-vector/festivasl-food-court-hall-logo-260nw-2233823755.jpg"
           class="rounded-circle me-2" width="60" height="60">
      Food Court
    </a>
    <a href="register.html" class="btn btn-outline-light">Register</a>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-grow-1 d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-md-6 col-lg-5">
        <div class="card text-white shadow-lg rounded-4 login-bg">
          <div class="card-body p-4 bg-overlay">
            <h3 class="text-center mb-4">Login</h3>

            <form action="home.html">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
              </div>

              <div class="d-grid gap-2">
                <button class="btn btn-primary">Login</button>
              </div>

              <p class="text-center mt-3">
                Don’t have an account? <a href="register.html" class="text-warning">Register</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="bg-primary text-light text-center py-2">
  <small>&copy; Food Court. All Rights Reserved | Ritesh Chaubey</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
